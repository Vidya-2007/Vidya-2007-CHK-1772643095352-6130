<!DOCTYPE html>
<html>
<head>
<title>AI Government Scheme Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
AI Government Scheme Finder
</header>

<div class="container">

<h2>Citizen Verification</h2>

<label>Aadhaar Number</label>
<input type="text" id="aadhaar" placeholder="Enter 12 digit Aadhaar">

<button onclick="verifyAadhaar()">Verify Aadhaar</button>

<p id="aadhaarStatus"></p>


<label>Bank Account Number</label>
<input type="text" id="bank" placeholder="Enter account number">

<label>IFSC Code</label>
<input type="text" id="ifsc" placeholder="Enter IFSC code">

<button onclick="verifyBank()">Verify Bank</button>

<p id="bankStatus"></p>


<h2>Check Eligible Government Schemes</h2>

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="all">All</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Income</label>
<input type="number" id="income">

<label>Category</label>
<select id="category">
<option value="all">All</option>
<option value="farmer">Farmer</option>
<option value="student">Student</option>
<option value="woman">Woman</option>
<option value="senior">Senior Citizen</option>
<option value="unemployed">Unemployed</option>
<option value="poor">BPL</option>
</select>

<button onclick="findSchemes()">Find Schemes</button>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
