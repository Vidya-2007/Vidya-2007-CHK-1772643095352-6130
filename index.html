<!DOCTYPE html>
<html>
<head>
    <title>Government Scheme Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="applyLanguage()">

<div class="container">

    <!-- Voice Assistant at top -->
    <div class="voice-assistant">
        <h3>Voice Assistant</h3>
        <button onclick="startVoice()">Start Voice</button>
        <p id="voiceText"></p>
    </div>

    <!-- User Details Form -->
    <div class="user-details">
        <input type="number" id="age" placeholder="Age">
        <select id="gender">
            <option value="all">Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        <input type="number" id="income" placeholder="Income">
        <select id="category">
            <option value="all">Category</option>
            <option value="student">Student</option>
            <option value="farmer">Farmer</option>
            <option value="senior">Senior Citizen</option>
            <option value="women">Women</option>
            <option value="orphan">Orphan</option>
            <option value="pwd">PWD</option>
        </select>
    </div>

    <!-- Find Schemes Button at bottom -->
    <div class="find-schemes">
        <button onclick="findSchemes()">Find Schemes</button>
    </div>

    <!-- Results -->
    <div id="results"></div>

</div>

<script src="script.js"></script>
</body>
</html>
