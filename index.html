<!DOCTYPE html>
<html>
<head>
<title>Scheme Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="applyLanguage()">

<header id="title">Government Scheme Finder</header>

<div class="container">

<label id="ageLabel">Age</label>
<input type="number" id="age">

<label id="genderLabel">Gender</label>
<select id="gender">
<option value="all">All</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>

<label id="incomeLabel">Income</label>
<input type="number" id="income">

<label id="categoryLabel">Category</label>
<select id="category">
<option value="all">All</option>
<option value="student">Student</option>
<option value="farmer">Farmer</option>
<option value="senior">Senior Citizen</option>
<option value="women">Women</option>
<option value="orphan">Orphan</option>
<option value="pwd">PWD</option>
</select>

<button id="findBtn" onclick="findSchemes()">Find Schemes</button>

<button id="voiceBtn" onclick="startVoice()">Voice Assistant</button>

<p id="voiceText"></p>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
